<!-- Report Content Modal -->
<div class="modal fade" id="reportModal" tabindex="-1" aria-labelledby="reportModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="reportModalLabel">
                    <i class="bi bi-flag"></i> Report Content
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="reportForm">
                    <div class="mb-3">
                        <label for="reportCategory" class="form-label">Category *</label>
                        <select class="form-select" id="reportCategory" required>
                            <option value="">Select a category...</option>
                        </select>
                        <div class="form-text">Choose the category that best describes the issue.</div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="reportReason" class="form-label">Detailed Reason *</label>
                        <textarea class="form-control" 
                                  id="reportReason" 
                                  rows="4" 
                                  placeholder="Please provide specific details about why you're reporting this content..."
                                  maxlength="1000"
                                  required></textarea>
                        <div class="form-text">
                            <span class="character-count">0/1000</span> characters
                            <br>Minimum 10 characters required
                        </div>
                    </div>
                    
                    <div class="alert alert-info">
                        <i class="bi bi-info-circle"></i>
                        <strong>Please note:</strong> False reports may result in restrictions on your account. 
                        Reports are reviewed by our moderation team and appropriate action will be taken.
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" id="submitReport">
                    <i class="bi bi-flag"></i> Submit Report
                </button>
            </div>
        </div>
    </div>
</div>

<script>
// Report modal functionality
let reportModal;
let currentContentType = null;
let currentContentId = null;

document.addEventListener('DOMContentLoaded', function() {
    reportModal = new bootstrap.Modal(document.getElementById('reportModal'));
    
    // Load report categories
    loadReportCategories();
    
    // Setup form handlers
    setupReportForm();
    
    // Setup character counter
    setupCharacterCounter();
});

function showReportModal(contentType, contentId) {
    currentContentType = contentType;
    currentContentId = contentId;
    
    // Check for duplicate reports first
    checkDuplicateReport(contentType, contentId);
}

function loadReportCategories() {
    fetch('/reports/categories')
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                const select = document.getElementById('reportCategory');
                select.innerHTML = '<option value="">Select a category...</option>';
                
                data.categories.forEach(category => {
                    const option = document.createElement('option');
                    option.value = category.id;
                    option.textContent = category.name;
                    option.title = category.description;
                    select.appendChild(option);
                });
            }
        })
        .catch(error => {
            console.error('Error loading categories:', error);
            showMessage('Failed to load report categories', 'error');
        });
}

function checkDuplicateReport(contentType, contentId) {
    fetch(`/reports/check-duplicate?content_type=${contentType}&content_id=${contentId}`)
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                if (data.has_duplicate) {
                    showMessage('You have already reported this content', 'warning');
                } else {
                    reportModal.show();
                }
            } else {
                reportModal.show(); // Show modal anyway if check fails
            }
        })
        .catch(error => {
            console.error('Error checking duplicate:', error);
            reportModal.show(); // Show modal anyway if check fails
        });
}

function setupReportForm() {
    const submitBtn = document.getElementById('submitReport');
    const form = document.getElementById('reportForm');
    
    submitBtn.addEventListener('click', function() {
        if (form.checkValidity()) {
            submitReport();
        } else {
            form.reportValidity();
        }
    });
    
    // Reset form when modal is hidden
    document.getElementById('reportModal').addEventListener('hidden.bs.modal', function() {
        form.reset();
        updateCharacterCount();
        currentContentType = null;
        currentContentId = null;
    });
}

function setupCharacterCounter() {
    const textarea = document.getElementById('reportReason');
    const counter = document.querySelector('.character-count');
    
    textarea.addEventListener('input', updateCharacterCount);
    
    function updateCharacterCount() {
        const current = textarea.value.length;
        const max = 1000;
        
        counter.textContent = `${current}/${max}`;
        
        // Update styling based on length
        counter.classList.remove('text-warning', 'text-danger');
        if (current > max * 0.9) {
            counter.classList.add('text-danger');
        } else if (current > max * 0.8) {
            counter.classList.add('text-warning');
        }
        
        // Update submit button state
        const submitBtn = document.getElementById('submitReport');
        const isValid = current >= 10 && current <= max;
        submitBtn.disabled = !isValid;
    }
    
    // Make updateCharacterCount available globally
    window.updateCharacterCount = updateCharacterCount;
}

function submitReport() {
    const categoryId = document.getElementById('reportCategory').value;
    const reason = document.getElementById('reportReason').value;
    const submitBtn = document.getElementById('submitReport');
    
    if (!categoryId || !reason || reason.length < 10) {
        showMessage('Please fill in all required fields', 'error');
        return;
    }
    
    // Disable submit button
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> Submitting...';
    
    const reportData = {
        content_type: currentContentType,
        content_id: currentContentId,
        category_id: categoryId,
        reason: reason
    };
    
    fetch('/reports/create', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify(reportData)
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            showMessage(data.message, 'success');
            reportModal.hide();
        } else {
            showMessage(data.message, 'error');
        }
    })
    .catch(error => {
        console.error('Error submitting report:', error);
        showMessage('Failed to submit report', 'error');
    })
    .finally(() => {
        // Re-enable submit button
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="bi bi-flag"></i> Submit Report';
    });
}

function showMessage(message, type) {
    // Create toast notification
    const toast = document.createElement('div');
    toast.className = `alert alert-${type === 'error' ? 'danger' : type} alert-dismissible fade show position-fixed`;
    toast.style.cssText = 'top: 20px; right: 20px; z-index: 1060; min-width: 300px;';
    toast.innerHTML = `
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    `;
    
    document.body.appendChild(toast);
    
    // Auto-remove after 5 seconds
    setTimeout(() => {
        if (toast.parentNode) {
            toast.parentNode.removeChild(toast);
        }
    }, 5000);
}
</script>
